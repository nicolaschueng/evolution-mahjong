<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>进化麻将 v2</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #0d2818 0%, #1a472a 50%, #2d5a3d 100%);
            color: white;
            height: 100vh;
            overflow: hidden;
            touch-action: manipulation;
        }

        .game-container {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* 顶部信息栏 */
        .game-info {
            height: 60px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            background: rgba(0, 0, 0, 0.4);
            border-bottom: 2px solid rgba(255, 255, 255, 0.2);
        }

        .player-info {
            display: flex;
            gap: 15px;
        }

        .player {
            padding: 8px 16px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.15);
            border: 2px solid transparent;
            transition: all 0.3s;
            font-size: 14px;
        }

        .player.active {
            border-color: #ffd700;
            background: rgba(255, 215, 0, 0.25);
            box-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
        }

        .player.banker {
            border-color: #ff6b6b;
            background: rgba(255, 107, 107, 0.2);
        }

        .game-status {
            font-size: 16px;
            font-weight: bold;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
        }

        /* 牌桌区域 */
        .table-area {
            flex: 1;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .table {
            width: 90%;
            height: 90%;
            background: linear-gradient(145deg, #1a472a, #2d5a3d);
            border-radius: 20px;
            border: 8px solid #8b4513;
            box-shadow:
                inset 0 0 50px rgba(0, 0, 0, 0.3),
                0 10px 30px rgba(0, 0, 0, 0.5);
            position: relative;
            overflow: hidden;
        }

        /* 牌河区域 */
        .discard-pool {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 70%;
            height: 70%;
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            grid-template-rows: repeat(6, 1fr);
            gap: 5px;
            padding: 20px;
        }

        .discard-slot {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 5px;
            border: 1px dashed rgba(255, 255, 255, 0.1);
        }

        /* 玩家手牌区域 */
        .player-area {
            position: absolute;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .player-area.bottom {
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            width: 80%;
            height: 120px;
        }

        .player-area.top {
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            width: 80%;
            height: 80px;
            flex-direction: row;
        }

        .player-area.left {
            left: 10px;
            top: 50%;
            transform: translateY(-50%);
            width: 80px;
            height: 60%;
            flex-direction: column;
        }

        .player-area.right {
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            width: 80px;
            height: 60%;
            flex-direction: column;
        }

        /* 麻将牌样式 */
        .tile {
            width: 40px;
            height: 56px;
            background: white;
            border-radius: 6px;
            border: 2px solid #8b4513;
            box-shadow:
                0 2px 8px rgba(0, 0, 0, 0.3),
                inset 0 0 10px rgba(0, 0, 0, 0.1);
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            margin: 2px;
        }

        .tile:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.4);
        }

        .tile.selected {
            transform: translateY(-10px);
            border-color: #ffd700;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
        }

        .tile.back {
            background: linear-gradient(45deg, #8b4513, #a0522d);
            border-color: #654321;
        }

        /* 筒子牌 */
        .tile.tong {
            background: linear-gradient(135deg, #fff, #f8f8f8);
        }

        .tile.tong .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #e74c3c;
            margin: 1px;
        }

        .tile.tong[data-value="1"] .dots { display: flex; justify-content: center; align-items: center; }
        .tile.tong[data-value="2"] .dots { display: flex; justify-content: space-between; flex-wrap: wrap; height: 100%; align-items: center; }
        .tile.tong[data-value="3"] .dots { display: flex; flex-direction: column; justify-content: space-between; height: 100%; align-items: center; }
        .tile.tong[data-value="4"] .dots { display: grid; grid-template-columns: 1fr 1fr; gap: 2px; align-items: center; justify-items: center; }
        .tile.tong[data-value="5"] .dots { display: grid; grid-template-columns: 1fr 1fr; gap: 2px; align-items: center; justify-items: center; position: relative; }
        .tile.tong[data-value="5"] .dot:nth-child(5) { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); }
        .tile.tong[data-value="6"] .dots { display: grid; grid-template-columns: 1fr 1fr; gap: 2px; align-items: center; justify-items: center; }
        .tile.tong[data-value="7"] .dots { display: grid; grid-template-columns: 1fr 1fr; gap: 2px; align-items: center; justify-items: center; position: relative; }
        .tile.tong[data-value="7"] .dot:nth-child(7) { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); }
        .tile.tong[data-value="8"] .dots { display: grid; grid-template-columns: 1fr 1fr; gap: 2px; align-items: center; justify-items: center; }
        .tile.tong[data-value="9"] .dots { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1px; align-items: center; justify-items: center; }

        /* 条子牌 */
        .tile.tiao {
            background: linear-gradient(135deg, #27ae60, #2ecc71);
            color: white;
        }

        .tile.tiao .bamboo {
            width: 4px;
            height: 20px;
            background: white;
            border-radius: 2px;
            margin: 1px;
            position: relative;
        }

        .tile.tiao .bamboo::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -1px;
            right: -1px;
            height: 4px;
            background: white;
            border-radius: 2px;
        }

        .tile.tiao .bamboo::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: -1px;
            right: -1px;
            height: 4px;
            background: white;
            border-radius: 2px;
        }

        /* 万子牌 */
        .tile.wan {
            background: linear-gradient(135deg, #fff, #f8f8f8);
            color: #c0392b;
            font-size: 20px;
            position: relative;
        }

        .tile.wan::before {
            content: '万';
            position: absolute;
            bottom: 5px;
            right: 5px;
            font-size: 10px;
            color: black;
        }

        /* 操作按钮区域 */
        .action-buttons {
            position: absolute;
            bottom: 140px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            padding: 10px;
            background: rgba(0, 0, 0, 0.6);
            border-radius: 10px;
            border: 2px solid rgba(255, 255, 255, 0.2);
        }

        .action-btn {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            color: white;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.5);
        }

        .action-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
        }

        .action-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .btn-hu { background: linear-gradient(135deg, #e74c3c, #c0392b); }
        .btn-gang { background: linear-gradient(135deg, #f39c12, #e67e22); }
        .btn-peng { background: linear-gradient(135deg, #3498db, #2980b9); }
        .btn-chi { background: linear-gradient(135deg, #27ae60, #2ecc71); }
        .btn-guo { background: linear-gradient(135deg, #95a5a6, #7f8c8d); }

        /* 响应式设计 */
        @media (max-width: 430px) {
            .tile {
                width: 35px;
                height: 49px;
                font-size: 14px;
            }

            .player-area.bottom {
                height: 100px;
            }

            .player-area.top {
                height: 60px;
            }

            .player-area.left,
            .player-area.right {
                width: 60px;
            }

            .action-buttons {
                bottom: 120px;
                flex-wrap: wrap;
                justify-content: center;
            }

            .action-btn {
                padding: 10px 16px;
                font-size: 12px;
            }
        }

        @media (max-width: 375px) {
            .tile {
                width: 30px;
                height: 42px;
                font-size: 12px;
            }

            .player-area.bottom {
                height: 90px;
            }

            .game-info {
                padding: 0 10px;
            }

            .player {
                padding: 6px 12px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="game-info">
            <div class="player-info">
                <div class="player" id="player-top">对家</div>
                <div class="player" id="player-left">左家</div>
                <div class="player active" id="player-bottom">玩家</div>
                <div class="player" id="player-right">右家</div>
            </div>
            <div class="game-status" id="game-status">准备开始</div>
        </div>

        <div class="table-area">
            <div class="table">
                <!-- 牌河 -->
                <div class="discard-pool" id="discard-pool">
                    <!-- 牌河格子由JS动态生成 -->
                </div>

                <!-- 玩家手牌区域 -->
                <div class="player-area top" id="player-top-area">
                    <!-- 对家手牌 -->
                </div>
                <div class="player-area left" id="player-left-area">
                    <!-- 左家手牌 -->
                </div>
                <div class="player-area right" id="player-right-area">
                    <!-- 右家手牌 -->
                </div>
                <div class="player-area bottom" id="player-bottom-area">
                    <!-- 玩家手牌 -->
                </div>
            </div>
        </div>

        <!-- 操作按钮 -->
        <div class="action-buttons" id="action-buttons">
            <button class="action-btn btn-hu" id="btn-hu">胡</button>
            <button class="action-btn btn-gang" id="btn-gang">杠</button>
            <button class="action-btn btn-peng" id="btn-peng">碰</button>
            <button class="action-btn btn-chi" id="btn-chi">吃</button>
            <button class="action-btn btn-guo" id="btn-guo">过</button>
        </div>
    </div>

    <script>
        class EvolutionMahjongV2 {
            constructor() {
                this.players = ['top', 'left', 'bottom', 'right'];
                this.currentPlayer = 'bottom';
                this.banker = 'bottom';
                this.gameState = 'waiting';
                this.tiles = [];
                this.playerHands = {
                    top: [],
                    left: [],
                    bottom: [],
                    right: []
                };
                this.discardedTiles = [];
                this.lastDiscardedTile = null;
                this.selectedTile = null;
                this.canChi = false;
                this.canPeng = false;
                this.canGang = false;
                this.canHu = false;

                this.initGame();
            }

            initGame() {
                this.generateTiles();
                this.shuffleTiles();
                this.dealInitialTiles();
                this.updateUI();
                this.setupEventListeners();
            }

            generateTiles() {
                this.tiles = [];
                const types = ['tong', 'tiao', 'wan'];

                for (let type of types) {
                    for (let value = 1; value <= 9; value++) {
                        // 每种牌4张
                        for (let i = 0; i < 4; i++) {
                            this.tiles.push({ type, value, id: `${type}-${value}-${i}` });
                        }
                    }
                }
            }

            shuffleTiles() {
                for (let i = this.tiles.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [this.tiles[i], this.tiles[j]] = [this.tiles[j], this.tiles[i]];
                }
            }

            dealInitialTiles() {
                // 每人13张牌
                this.players.forEach(player => {
                    this.playerHands[player] = this.tiles.splice(0, 13);
                    this.sortHand(this.playerHands[player]);
                });

                this.gameState = 'playing';
                this.updateGameStatus('玩家回合');
            }

            sortHand(hand) {
                return hand.sort((a, b) => {
                    const typeOrder = { 'tong': 1, 'tiao': 2, 'wan': 3 };
                    if (typeOrder[a.type] !== typeOrder[b.type]) {
                        return typeOrder[a.type] - typeOrder[b.type];
                    }
                    return a.value - b.value;
                });
            }

            drawTile(player) {
                if (this.tiles.length === 0) {
                    this.endGame('流局');
                    return null;
                }

                const tile = this.tiles.shift();
                this.playerHands[player].push(tile);
                this.sortHand(this.playerHands[player]);

                // 摸牌后检查自摸进阶
                this.checkSelfEvolution(player);

                return tile;
            }

            discardTile(player, tileIndex) {
                const tile = this.playerHands[player].splice(tileIndex, 1)[0];
                this.discardedTiles.push({
                    tile,
                    player,
                    position: this.discardedTiles.length
                });
                this.lastDiscardedTile = { tile, player };

                // 检查其他玩家是否可以吃碰杠
                this.checkOtherPlayersActions(player, tile);

                this.nextPlayer();
            }

            checkOtherPlayersActions(discardingPlayer, tile) {
                this.canChi = false;
                this.canPeng = false;
                this.canGang = false;
                this.canHu = false;

                if (discardingPlayer === 'bottom') return;

                const playerHand = this.playerHands.bottom;

                // 检查吃（只能吃上家的牌）
                if (this.getPreviousPlayer(discardingPlayer) === 'bottom') {
                    this.canChi = this.canChiTile(playerHand, tile);
                }

                // 检查碰
                this.canPeng = this.canPengTile(playerHand, tile);

                // 检查杠
                this.canGang = this.canGangTile(playerHand, tile);

                // 检查胡
                this.canHu = this.canHuTile(playerHand, tile);

                this.updateActionButtons();
            }

            canChiTile(hand, tile) {
                if (tile.type === 'wan') return false; // 万子不能吃

                const values = hand
                    .filter(t => t.type === tile.type)
                    .map(t => t.value);

                const tileValue = tile.value;

                // 检查是否能组成顺子
                return (values.includes(tileValue - 2) && values.includes(tileValue - 1)) ||
                       (values.includes(tileValue - 1) && values.includes(tileValue + 1)) ||
                       (values.includes(tileValue + 1) && values.includes(tileValue + 2));
            }

            canPengTile(hand, tile) {
                const sameTiles = hand.filter(t =>
                    t.type === tile.type && t.value === tile.value
                );
                return sameTiles.length >= 2;
            }

            canGangTile(hand, tile) {
                const sameTiles = hand.filter(t =>
                    t.type === tile.type && t.value === tile.value
                );
                return sameTiles.length >= 3;
            }

            canHuTile(hand, tile) {
                // 简化版胡牌判断
                const testHand = [...hand, tile];
                return this.isWinningHand(testHand);
            }

            isWinningHand(hand) {
                // 简化版胡牌逻辑
                if (hand.length % 3 !== 2) return false;

                // 检查是否包含顺子或刻子组合
                return this.checkHandPattern([...hand]);
            }

            checkHandPattern(hand) {
                if (hand.length === 0) return true;

                // 尝试找刻子
                for (let i = 0; i < hand.length - 2; i++) {
                    if (hand[i].type === hand[i+1].type && hand[i].type === hand[i+2].type &&
                        hand[i].value === hand[i+1].value && hand[i].value === hand[i+2].value) {
                        const newHand = [...hand];
                        newHand.splice(i, 3);
                        if (this.checkHandPattern(newHand)) return true;
                    }
                }

                // 尝试找顺子
                for (let i = 0; i < hand.length - 2; i++) {
                    if (hand[i].type === hand[i+1].type && hand[i].type === hand[i+2].type &&
                        hand[i].type !== 'wan' && // 万子不能吃顺子
                        hand[i].value + 1 === hand[i+1].value &&
                        hand[i].value + 2 === hand[i+2].value) {
                        const newHand = [...hand];
                        newHand.splice(i, 3);
                        if (this.checkHandPattern(newHand)) return true;
                    }
                }

                return hand.length === 0;
            }

            chi() {
                if (!this.canChi) return;

                // 实现吃牌逻辑
                this.performAction('chi');

                // 吃牌后摸3张奖励
                for (let i = 0; i < 3; i++) {
                    this.drawTile('bottom');
                }

                this.nextPlayer();
            }

            peng() {
                if (!this.canPeng) return;

                // 实现碰牌逻辑
                this.performAction('peng');

                // 碰牌后摸3张奖励
                for (let i = 0; i < 3; i++) {
                    this.drawTile('bottom');
                }

                this.nextPlayer();
            }

            gang() {
                if (!this.canGang) return;

                // 实现杠牌逻辑
                this.performAction('gang');

                // 杠牌后摸4张奖励（3+1）
                for (let i = 0; i < 4; i++) {
                    this.drawTile('bottom');
                }

                this.nextPlayer();
            }

            hu() {
                if (!this.canHu) return;

                this.endGame('玩家胡牌！');
            }

            guo() {
                this.canChi = false;
                this.canPeng = false;
                this.canGang = false;
                this.canHu = false;
                this.updateActionButtons();
                this.nextPlayer();
            }

            performAction(action) {
                // 实现具体的吃碰杠动作
                console.log(`执行${action}动作`);
            }

            checkSelfEvolution(player) {
                if (player !== 'bottom') return;

                const hand = this.playerHands[player];

                // 检查是否有暗牌可以亮出（凑齐顺子/刻子）
                this.checkForSelfEvolution(hand);
            }

            checkForSelfEvolution(hand) {
                // 简化版自摸进阶检查
                const sortedHand = this.sortHand([...hand]);

                // 检查刻子
                for (let i = 0; i < sortedHand.length - 2; i++) {
                    if (sortedHand[i].type === sortedHand[i+1].type &&
                        sortedHand[i].type === sortedHand[i+2].type &&
                        sortedHand[i].value === sortedHand[i+1].value &&
                        sortedHand[i].value === sortedHand[i+2].value) {
                        // 发现刻子，可以亮出
                        this.promptSelfEvolution('刻子', sortedHand[i]);
                        return;
                    }
                }

                // 检查顺子
                for (let i = 0; i < sortedHand.length - 2; i++) {
                    if (sortedHand[i].type === sortedHand[i+1].type &&
                        sortedHand[i].type === sortedHand[i+2].type &&
                        sortedHand[i].type !== 'wan' &&
                        sortedHand[i].value + 1 === sortedHand[i+1].value &&
                        sortedHand[i].value + 2 === sortedHand[i+2].value) {
                        // 发现顺子，可以亮出
                        this.promptSelfEvolution('顺子', sortedHand[i]);
                        return;
                    }
                }
            }

            promptSelfEvolution(type, tile) {
                if (confirm(`发现${type}，是否亮出？`)) {
                    // 实现亮出逻辑
                    console.log(`亮出${type}`);
                }
            }

            nextPlayer() {
                const currentIndex = this.players.indexOf(this.currentPlayer);
                this.currentPlayer = this.players[(currentIndex + 1) % 4];

                if (this.currentPlayer === 'bottom') {
                    // 玩家回合：先摸牌
                    this.drawTile('bottom');
                    this.updateGameStatus('玩家回合 - 请选择要打出的牌');
                } else {
                    // AI回合
                    this.updateGameStatus(`${this.getPlayerName(this.currentPlayer)}回合`);
                    this.simulateAITurn();
                }

                this.updateUI();
            }

            simulateAITurn() {
                setTimeout(() => {
                    const aiPlayer = this.currentPlayer;

                    // AI摸牌
                    this.drawTile(aiPlayer);

                    // AI打牌（简单逻辑：打第一张牌）
                    this.discardTile(aiPlayer, 0);

                }, 1000);
            }

            getPreviousPlayer(player) {
                const index = this.players.indexOf(player);
                return this.players[(index + 3) % 4]; // 上家
            }

            getPlayerName(position) {
                const names = {
                    'top': '对家',
                    'left': '左家',
                    'bottom': '玩家',
                    'right': '右家'
                };
                return names[position];
            }

            updateUI() {
                this.updatePlayerHands();
                this.updateDiscardPool();
                this.updatePlayerStatus();
                this.updateActionButtons();
            }

            updatePlayerHands() {
                this.players.forEach(player => {
                    const area = document.getElementById(`player-${player}-area`);
                    area.innerHTML = '';

                    const hand = this.playerHands[player];
                    hand.forEach((tile, index) => {
                        const tileElement = this.createTileElement(tile, player, index);
                        area.appendChild(tileElement);
                    });
                });
            }

            createTileElement(tile, player, index) {
                const div = document.createElement('div');
                div.className = `tile ${tile.type}`;
                div.setAttribute('data-type', tile.type);
                div.setAttribute('data-value', tile.value);
                div.setAttribute('data-index', index);

                if (player !== 'bottom') {
                    div.classList.add('back');
                } else {
                    div.innerHTML = this.getTileContent(tile);

                    div.addEventListener('click', () => {
                        this.selectTile(index);
                    });
                }

                return div;
            }

            getTileContent(tile) {
                if (tile.type === 'tong') {
                    return `<div class="dots">${this.getTongDots(tile.value)}</div>`;
                } else if (tile.type === 'tiao') {
                    return `<div class="bamboos">${this.getTiaoBamboos(tile.value)}</div>`;
                } else {
                    return `<span>${tile.value}</span>`;
                }
            }

            getTongDots(value) {
                let dots = '';
                for (let i = 0; i < value; i++) {
                    dots += '<div class="dot"></div>';
                }
                return dots;
            }

            getTiaoBamboos(value) {
                let bamboos = '';
                for (let i = 0; i < value; i++) {
                    bamboos += '<div class="bamboo"></div>';
                }
                return bamboos;
            }

            updateDiscardPool() {
                const pool = document.getElementById('discard-pool');
                pool.innerHTML = '';

                for (let i = 0; i < 36; i++) {
                    const slot = document.createElement('div');
                    slot.className = 'discard-slot';

                    if (i < this.discardedTiles.length) {
                        const discard = this.discardedTiles[i];
                        const tileElement = this.createTileElement(discard.tile, 'discard', i);
                        slot.appendChild(tileElement);
                    }

                    pool.appendChild(slot);
                }
            }

            updatePlayerStatus() {
                this.players.forEach(player => {
                    const element = document.getElementById(`player-${player}`);
                    element.classList.remove('active', 'banker');

                    if (player === this.currentPlayer) {
                        element.classList.add('active');
                    }
                    if (player === this.banker) {
                        element.classList.add('banker');
                    }

                    element.textContent = `${this.getPlayerName(player)} (${this.playerHands[player].length}张)`;
                });
            }

            updateActionButtons() {
                const buttons = {
                    'btn-hu': this.canHu,
                    'btn-gang': this.canGang,
                    'btn-peng': this.canPeng,
                    'btn-chi': this.canChi,
                    'btn-guo': this.canChi || this.canPeng || this.canGang || this.canHu
                };

                Object.keys(buttons).forEach(btnId => {
                    const btn = document.getElementById(btnId);
                    btn.disabled = !buttons[btnId];
                });
            }

            updateGameStatus(status) {
                document.getElementById('game-status').textContent = status;
            }

            selectTile(index) {
                if (this.currentPlayer !== 'bottom') return;

                // 取消之前的选择
                if (this.selectedTile !== null) {
                    const previousTile = document.querySelector(`[data-index="${this.selectedTile}"]`);
                    if (previousTile) previousTile.classList.remove('selected');
                }

                this.selectedTile = index;
                const currentTile = document.querySelector(`[data-index="${index}"]`);
                currentTile.classList.add('selected');

                // 可以选择打出的牌
                if (this.gameState === 'playing' && this.currentPlayer === 'bottom') {
                    this.discardTile('bottom', index);
                }
            }

            setupEventListeners() {
                document.getElementById('btn-hu').addEventListener('click', () => this.hu());
                document.getElementById('btn-gang').addEventListener('click', () => this.gang());
                document.getElementById('btn-peng').addEventListener('click', () => this.peng());
                document.getElementById('btn-chi').addEventListener('click', () => this.chi());
                document.getElementById('btn-guo').addEventListener('click', () => this.guo());
            }

            endGame(message) {
                this.gameState = 'ended';
                this.updateGameStatus(message);
                alert(message);
            }
        }

        // 启动游戏
        document.addEventListener('DOMContentLoaded', () => {
            new EvolutionMahjongV2();
        });
    </script>
</body>
</html>
